<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Contact Me</title>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #0f172a, #1e293b);
    color: white;
    margin: 0;
    padding: 0;
}

/* Container */
.container {
    max-width: 600px;
    margin: 60px auto;
    padding: 20px;
}

/* Card */
.card {
    background: #1e293b;
    padding: 25px;
    border-radius: 15px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.3);
}

/* Title */
h1 {
    text-align: center;
    color: #38bdf8;
}

/* Info */
.info {
    margin-bottom: 20px;
    line-height: 1.6;
}

/* Form */
form {
    display: flex;
    flex-direction: column;
}

label {
    margin-top: 10px;
    margin-bottom: 5px;
}

/* Inputs */
input, textarea {
    padding: 10px;
    border-radius: 8px;
    border: none;
    outline: none;
    background: #334155;
    color: white;
}

input:focus, textarea:focus {
    border: 1px solid #38bdf8;
}

/* Button */
button {
    margin-top: 15px;
    padding: 12px;
    border: none;
    border-radius: 10px;
    background: #38bdf8;
    color: black;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #0ea5e9;
}
</style>

</head>

<body>

<div class="container">
    <div class="card">

        <h1>📩 Contact Me</h1>

        <div class="info">
            <p><strong>Name:</strong> Yassine</p>
            <p><strong>Phone:</strong> 56064621</p>
            <p><strong>Email:</strong> jemaay55@gmail.com</p>
        </div>

        <form action="https://formspree.io/f/xlgonpqa" method="post">

            <label>Full Name</label>
            <input type="text" name="Full Name" required>

            <label>Email Addres</label>
            <input type="tel" name="Phone Number">

            <label>Your Email</label>
            <input type="email" name="Email Address" required>

            <label>Your Message</label>
            <textarea name="yourMessage" rows="5" required></textarea>

            <button type="submit">Send Message 🚀</button>

        </form>

    </div>
</div>

</body>
</html>
